apiVersion: 1

groups:
  - orgId: 1
    name: monica-companion-alerts
    folder: Monica Companion
    interval: 1m
    rules:
      - uid: service-down
        title: ServiceDown
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: absent(up{job="otel-collector"})
              instant: true
              refId: A
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "OTel Collector is down - telemetry pipeline is broken"
          description: "The OTel Collector has been unreachable for more than 1 minute. No telemetry is being collected."
        labels:
          severity: critical

      - uid: high-error-rate
        title: HighErrorRate
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                (sum(rate(http_server_request_duration_seconds_count{http_status_code=~"5.."}[2m])) by (service_name)
                / sum(rate(http_server_request_duration_seconds_count[2m])) by (service_name)) > 0.05
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "High HTTP 5xx error rate on {{ $labels.service_name }}"
          description: "Service {{ $labels.service_name }} has more than 5% HTTP 5xx errors over the last 2 minutes."
        labels:
          severity: warning

      - uid: high-latency
        title: HighLatency
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                histogram_quantile(0.95,
                  sum(rate(http_server_request_duration_seconds_bucket[2m])) by (le, service_name)
                ) > 5
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "High p95 latency on {{ $labels.service_name }}"
          description: "Service {{ $labels.service_name }} p95 response time exceeds 5 seconds over the last 2 minutes."
        labels:
          severity: warning

      - uid: budget-alarm
        title: BudgetAlarm
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: guardrail_budget_alarm_active == 1
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "OpenAI budget alarm threshold exceeded"
          description: "The cumulative OpenAI spend has exceeded the configured alarm threshold percentage. Review usage and consider adjusting limits."
        labels:
          severity: warning

      - uid: budget-exhausted
        title: BudgetExhausted
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: guardrail_budget_current_spend_usd >= guardrail_budget_limit_usd
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "OpenAI budget exhausted - AI features are blocked"
          description: "The cumulative OpenAI spend has reached or exceeded the budget limit. All AI requests are being rejected until the budget is increased or the month resets."
        labels:
          severity: critical

      - uid: kill-switch-active
        title: KillSwitchActive
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: guardrail_kill_switch_active == 1
              instant: true
              refId: A
        noDataState: OK
        execErrState: OK
        for: 1m
        annotations:
          summary: "AI kill switch is active"
          description: "The operator kill switch is enabled. All AI requests are being rejected. Clear the kill switch via redis-cli DEL guardrail:kill-switch to restore service."
        labels:
          severity: info

      - uid: scheduler-misfire
        title: SchedulerMisfire
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 21600
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(scheduler_reminder_missed[6h]) > 0
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "Scheduler reminder misfire detected"
          description: "One or more reminders were missed (caught up or skipped) in the last 6 hours. Check scheduler logs for details."
        labels:
          severity: warning

      - uid: queue-backlog
        title: QueueBacklog
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: scheduler_queue_depth{state="waiting"} > 100
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "BullMQ queue backlog on {{ $labels.queue_name }}"
          description: "Queue {{ $labels.queue_name }} has had more than 100 waiting jobs for over 5 minutes. This may indicate worker saturation or downstream service issues."
        labels:
          severity: warning

      - uid: high-retry-rate
        title: HighRetryRate
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                (rate(scheduler_queue_retry_total[5m])
                / (rate(scheduler_queue_job_process_duration_seconds_count{status="completed"}[5m]) > 0)) > 0.3
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "High retry rate on {{ $labels.queue_name }}"
          description: "Queue {{ $labels.queue_name }} retry-to-completion ratio exceeds 30% over the last 5 minutes. This may indicate persistent downstream failures."
        labels:
          severity: warning
