name: LLM Integration Tests

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for running the LLM integration tests"
        required: false
        default: "Manual trigger"

concurrency:
  group: llm-integration
  cancel-in-progress: true

jobs:
  llm-integration:
    runs-on: ubuntu-latest
    if: ${{ secrets.OPENAI_API_KEY_CI != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run LLM integration tests
        run: pnpm test:llm-integration
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_CI }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-integration-results
          path: services/ai-router/llm-integration-results/
          if-no-files-found: warn
          retention-days: 30
