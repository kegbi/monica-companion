name: Monica Smoke Tests

on:
  schedule:
    # Run nightly at 3am UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger (e.g., release-candidate validation)"
        required: false
        type: string

# All smoke tests run against a real Monica v4 instance with seeded test data.
# This workflow is intentionally separate from CI and never runs on push/PR.

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mariadb:
        image: mariadb:11.7.2
        env:
          MYSQL_ROOT_PASSWORD: smoke_root_password
          MYSQL_DATABASE: monica
          MYSQL_USER: monica
          MYSQL_PASSWORD: smoke_db_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Monica .env
        run: |
          # The entrypoint's inline PHP uses getenv() for DB credentials
          # before Laravel boots, so -e flags are needed for the entrypoint.
          # Apache PHP workers don't inherit Docker -e vars, so they read
          # the .env file instead. We need both.
          cat > /tmp/monica-smoke.env <<'ENVEOF'
          APP_ENV=local
          APP_DEBUG=true
          APP_KEY=base64:eJGRxF0b1S7KPkUmhoeIQl/sM4LhOqGPVHNxAdT+sOA=
          APP_URL=http://localhost:80
          APP_DISABLE_SIGNUP=false
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=monica
          DB_USERNAME=monica
          DB_PASSWORD=smoke_db_password
          MAIL_MAILER=log
          HASH_DRIVER=bcrypt
          ENVEOF
          sed -i 's/^[[:space:]]*//' /tmp/monica-smoke.env

      - name: Start Monica container
        run: |
          docker run -d \
            --name monica-smoke \
            --network host \
            -v /tmp/monica-smoke.env:/var/www/html/.env \
            -e APP_KEY=base64:eJGRxF0b1S7KPkUmhoeIQl/sM4LhOqGPVHNxAdT+sOA= \
            -e DB_CONNECTION=mysql \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=3306 \
            -e DB_DATABASE=monica \
            -e DB_USERNAME=monica \
            -e DB_PASSWORD=smoke_db_password \
            monica:4.1.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build monica-api-lib
        run: pnpm --filter @monica-companion/monica-api-lib build

      - name: Wait for Monica and seed test data
        env:
          MONICA_SMOKE_URL: http://localhost:80
        run: pnpm tsx scripts/seed-monica-smoke.ts

      - name: Run smoke tests
        run: |
          # Source the generated .env.smoke for the API token
          if [ -f scripts/.env.smoke ]; then
            source scripts/.env.smoke
          elif [ -f .env.smoke ]; then
            source .env.smoke
          else
            echo "ERROR: .env.smoke not found"
            find . -name ".env.smoke" 2>/dev/null
            exit 1
          fi
          export MONICA_SMOKE_BASE_URL MONICA_SMOKE_API_TOKEN
          echo "API token length: ${#MONICA_SMOKE_API_TOKEN}"
          pnpm test:smoke:monica

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: packages/monica-api-lib/smoke-results/
          retention-days: 30

      - name: Monica container logs
        if: always()
        run: docker logs monica-smoke 2>&1 | tail -100 || true

      - name: Cleanup Monica container
        if: always()
        run: docker rm -f monica-smoke || true
