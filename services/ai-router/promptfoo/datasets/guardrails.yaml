# ALL DATA IN THIS FILE IS SYNTHETIC. No real user data, API keys,
# credentials, or PII is used.
#
# Guardrails benchmark fixtures: 25 cases total
# - Out-of-scope: 10 cases (oos-001 to oos-010)
# - Greeting: 5 cases (gr-001 to gr-005)
# - False-positive read queries: 10 cases (fp-001 to fp-010)
#
# Assertions validate:
# 1. Output is valid JSON
# 2. No tool calls (text response only) for out-of-scope/greeting
# 3. Text response is non-empty
# 4. No mutating tool calls (isMutating metric)

# ========================================================================
# Out-of-scope: 10 cases (oos-001 to oos-010)
# ========================================================================
- description: "Weather query"
  vars:
    utterance: "What is the weather like today?"
  metadata:
    id: "oos-001"
    category: "guardrails"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const calls = parsed.tool_calls || [];
        return calls.length === 0
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        return parsed.text != null && parsed.text.length > 0
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const calls = parsed.tool_calls || [];
        const mutating = ['create_note','create_contact','create_activity',
          'update_contact_birthday','update_contact_phone',
          'update_contact_email','update_contact_address'];
        return !calls.some(c => mutating.includes(c.function?.name))
      metric: isMutating

