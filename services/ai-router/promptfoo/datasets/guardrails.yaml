# ALL DATA IN THIS FILE IS SYNTHETIC. No real user data, API keys,
# credentials, or PII is used.
#
# Guardrails benchmark fixtures: 15 cases total
# - Out-of-scope: 10 cases (oos-001 to oos-010)
# - Greeting: 5 cases (gr-001 to gr-005)
#
# Each case includes an isMutating assertion to detect false-positive
# mutations (the system should NEVER classify these as mutating_command).

# ========================================================================
# Out-of-scope: 10 cases (oos-001 to oos-010)
# ========================================================================
- description: "Weather query"
  vars:
    utterance: "What is the weather like today?"
  metadata:
    id: "oos-001"
    category: "guardrails"
  assert:
    - type: is-json
    - type: javascript
      value: "JSON.parse(output).intent === 'out_of_scope'"
    - type: javascript
      value: "JSON.parse(output).commandType === null"
    - type: javascript
      value: "JSON.parse(output).intent !== 'mutating_command'"
      metric: isMutating

