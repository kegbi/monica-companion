# ALL DATA IN THIS FILE IS SYNTHETIC. No real user data, API keys,
# credentials, or PII is used. Names, dates, and relationships are
# fabricated for testing purposes only.
#
# Read intent benchmark fixtures: 60 cases total
# - query_birthday: 25 cases (ri-001 to ri-025)
# - query_phone: 20 cases (ri-026 to ri-045)
# - query_last_note: 15 cases (ri-046 to ri-060)

# ========================================================================
