- description: "Ask for a contact's birthday"
  vars:
    utterance: "What's Sarah's birthday?"
  metadata:
    id: "ri-001"
    category: "read_intent"
  assert:
    - type: is-json
    - type: javascript
      value: "JSON.parse(output).intent === 'read_query'"
    - type: javascript
      value: "JSON.parse(output).commandType === 'query_birthday'"
    - type: javascript
      value: "Boolean(JSON.parse(output).contactRef && JSON.parse(output).contactRef.toLowerCase().includes('sarah'))"

- description: "Ask for birthday using relationship label"
  vars:
