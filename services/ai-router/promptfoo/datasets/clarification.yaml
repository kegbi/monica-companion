# ALL DATA IN THIS FILE IS SYNTHETIC. No real user data, API keys,
# credentials, or PII is used.
#
# Clarification turn benchmark fixtures: 33 cases total
# - Disambiguation questions (cl-001 to cl-005)
# - Disambiguation answers (cl-006 to cl-010)
# - Confirmations (cl-011 to cl-015)
# - Negations (cl-016 to cl-019)
# - Edits / corrections (cl-020 to cl-022)
# - Provide missing info (cl-023 to cl-025)
# - Kinship narrowing & contact disambiguation regressions (cl-026 to cl-030)
# - Narrowing with active pending command context (cl-031 to cl-033)
#
# Groups:
# - Group A: No-context cases (standalone utterances)
# - Group B: Cases with conversationHistory (migrated from recentTurns)
# - Group C: Cases with conversationHistory including pending command context

# ========================================================================
# Disambiguation questions
# ========================================================================
- description: "Disambiguation question - which Sherry"
  vars:
    utterance: "Which Sherry?"
  metadata:
    id: "cl-001"
    category: "clarification"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const calls = parsed.tool_calls || [];
        const mutating = ['create_note','create_contact','create_activity',
          'update_contact_birthday','update_contact_phone',
          'update_contact_email','update_contact_address'];
        !calls.some(c => mutating.includes(c.function?.name))
      metric: isMutating

