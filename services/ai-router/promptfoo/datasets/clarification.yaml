# ALL DATA IN THIS FILE IS SYNTHETIC. No real user data, API keys,
# credentials, or PII is used.
#
# Clarification turn benchmark fixtures: 25 cases total
# - Disambiguation questions (cl-001 to cl-005)
# - Disambiguation answers (cl-006 to cl-010)
# - Confirmations (cl-011 to cl-015)
# - Negations (cl-016 to cl-019)
# - Edits / corrections (cl-020 to cl-022)
# - Provide missing info (cl-023 to cl-025)

# ========================================================================
# Disambiguation questions (cl-001 to cl-005)
# ========================================================================
- description: "Disambiguation question - which Sherry"
  vars:
    utterance: "Which Sherry?"
  metadata:
    id: "cl-001"
    category: "clarification"
  assert:
    - type: is-json
    - type: javascript
      value: "JSON.parse(output).intent === 'clarification_response'"

- description: "Disambiguation question - which Alex"
  vars:
    utterance: "Which Alex do you mean?"
  metadata:
    id: "cl-002"
    category: "clarification"
  assert:
    - type: is-json
    - type: javascript
      value: "JSON.parse(output).intent === 'clarification_response'"

- description: "Voice-style disambiguation - which David"
  vars:
    utterance: "wait which david are you talking about"
  metadata:
    id: "cl-003"
    category: "clarification"
  assert:
    - type: is-json
    - type: javascript
      value: "JSON.parse(output).intent === 'clarification_response'"

- description: "Disambiguation question in Spanish"
  vars:
    utterance: "A cual Sherry te refieres?"
  metadata:
    id: "cl-004"
    category: "clarification"
  assert:
    - type: is-json
    - type: javascript
      value: "JSON.parse(output).intent === 'clarification_response'"

- description: "Disambiguation question - asking for options"
  vars:
    utterance: "I have two Alexes, which one?"
  metadata:
    id: "cl-005"
    category: "clarification"
  assert:
    - type: is-json
    - type: javascript
      value: "JSON.parse(output).intent === 'clarification_response'"

# ========================================================================
# Disambiguation answers (cl-006 to cl-010)
# ========================================================================
- description: "Disambiguation answer - the one from work"
  vars:
    utterance: "The one from work"
  metadata:
    id: "cl-006"
    category: "clarification"
  assert:
    - type: is-json
    - type: javascript
      value: "JSON.parse(output).intent === 'clarification_response'"
    - type: javascript
      value: "JSON.parse(output).contactRef && JSON.parse(output).contactRef.toLowerCase().includes('work')"

- description: "Disambiguation answer - the friend"
  vars:
    utterance: "The friend one, not the colleague"
  metadata:
    id: "cl-007"
    category: "clarification"
  assert:
    - type: is-json
    - type: javascript
      value: "JSON.parse(output).intent === 'clarification_response'"
    - type: javascript
      value: "JSON.parse(output).contactRef && JSON.parse(output).contactRef.toLowerCase().includes('friend')"

- description: "Voice-style disambiguation answer with full name"
  vars:
    utterance: "i mean alex torres not alex kim"
  metadata:
    id: "cl-008"
    category: "clarification"
  assert:
    - type: is-json
    - type: javascript
      value: "JSON.parse(output).intent === 'clarification_response'"
    - type: javascript
      value: "JSON.parse(output).contactRef && JSON.parse(output).contactRef.toLowerCase().includes('alex torres')"

- description: "Disambiguation answer with last name"
  vars:
    utterance: "Chen, David Chen"
  metadata:
    id: "cl-009"
    category: "clarification"
  assert:
    - type: is-json
    - type: javascript
      value: "JSON.parse(output).intent === 'clarification_response'"
    - type: javascript
      value: "JSON.parse(output).contactRef && JSON.parse(output).contactRef.toLowerCase().includes('david chen')"

- description: "Disambiguation answer - my husband"
  vars:
    utterance: "My husband David"
  metadata:
    id: "cl-010"
    category: "clarification"
  assert:
    - type: is-json
    - type: javascript
      value: "JSON.parse(output).intent === 'clarification_response'"
    - type: javascript
      value: "JSON.parse(output).contactRef && (JSON.parse(output).contactRef.toLowerCase().includes('husband') || JSON.parse(output).contactRef.toLowerCase().includes('david'))"

