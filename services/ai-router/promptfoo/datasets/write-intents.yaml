- description: "Add a note to a contact by relationship label"
  vars:
    utterance: "Add a note to Mom about her garden project"
  metadata:
    id: "wi-001"
    category: "write_intent"
  assert:
    - type: is-json
    - type: javascript
      value: "JSON.parse(output).intent === 'mutating_command'"
    - type: javascript
      value: "JSON.parse(output).commandType === 'create_note'"
    - type: javascript
      value: "JSON.parse(output).contactRef && JSON.parse(output).contactRef.toLowerCase().includes('mom')"

