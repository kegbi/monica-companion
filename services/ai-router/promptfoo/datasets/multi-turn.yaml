# ========================================================================
# mt-004: Disambiguation with kinship narrowing
# ========================================================================
- description: "Name narrowing after kinship-based ambiguity with dad"
  vars:
    utterance: "David"
    conversationHistory: '[{"role":"user","content":"Add a note to dad: he called me today"},{"role":"assistant","content":null,"tool_calls":[{"id":"sc1","type":"function","function":{"name":"search_contacts","arguments":"{\"query\":\"dad\"}"}}]},{"role":"tool","tool_call_id":"sc1","content":"{\"status\":\"ok\",\"contacts\":[{\"contactId\":10,\"displayName\":\"David K\"},{\"contactId\":11,\"displayName\":\"Robert M\"},{\"contactId\":12,\"displayName\":\"James L\"},{\"contactId\":13,\"displayName\":\"Michael N\"},{\"contactId\":14,\"displayName\":\"William P\"},{\"contactId\":15,\"displayName\":\"Richard S\"}]}"},{"role":"assistant","content":"I found 6 contacts matching dad. Which one did you mean?"}]'
  metadata:
    id: "mt-004"
    category: "multi_turn"
    expectedTool: "create_note"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const calls = parsed.tool_calls || [];
        const search = calls.find(c => c.function?.name === 'search_contacts');
        if (search) {
          const args = JSON.parse(search.function.arguments || '{}');
          return args.query && args.query.toLowerCase().includes('david');
        }
        return calls.length > 0
      metric: contactResolution

# ========================================================================
# mt-005: Context switch after prior action
# ========================================================================
- description: "New activity request after prior note creation"
  vars:
    utterance: "Now add an activity that we had lunch together"
    conversationHistory: '[{"role":"user","content":"Add a note to Elena about the park visit"},{"role":"assistant","content":null,"tool_calls":[{"id":"sc1","type":"function","function":{"name":"search_contacts","arguments":"{\"query\":\"Elena\"}"}}]},{"role":"tool","tool_call_id":"sc1","content":"{\"status\":\"ok\",\"contacts\":[{\"contactId\":682023,\"displayName\":\"Elena Y\"}]}"},{"role":"assistant","content":null,"tool_calls":[{"id":"cn1","type":"function","function":{"name":"create_note","arguments":"{\"contact_id\":682023,\"body\":\"Park visit\"}"}}]},{"role":"tool","tool_call_id":"cn1","content":"{\"status\":\"success\",\"executionId\":\"exec-1\",\"message\":\"Note created.\"}"},{"role":"assistant","content":"Done! I added the note about the park visit to Elena Y."}]'
  metadata:
    id: "mt-005"
    category: "multi_turn"
    expectedTool: "create_activity"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const calls = parsed.tool_calls || [];
        return calls.length > 0
