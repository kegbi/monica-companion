services:
  # -- Infrastructure (always start) ------------------------------------------

  postgres:
    image: postgres:17.9-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: monica
      POSTGRES_PASSWORD: monica_dev
      POSTGRES_DB: monica_companion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monica"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:8.6.1-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  caddy:
    image: caddy:2.11.2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public

  # -- Dependency init (--profile app) -----------------------------------------

  deps-init:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: >
      sh -c "corepack enable && corepack prepare pnpm@10.12.1 --activate && pnpm install --frozen-lockfile"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    networks:
      - internal

  # -- Application services (--profile app) ------------------------------------

  telegram-bridge:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx services/telegram-bridge/src/index.ts"
    expose:
      - "3001"
    environment:
      PORT: 3001
      SERVICE_NAME: telegram-bridge
      JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS:-}
      TELEGRAM_MODE: ${TELEGRAM_MODE:-webhook}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-60}
      USER_MANAGEMENT_URL: http://user-management:3007
      AI_ROUTER_URL: http://ai-router:3002
      VOICE_TRANSCRIPTION_URL: http://voice-transcription:3003
      REDIS_URL: redis://redis:6379
      AI_ROUTER_TIMEOUT_MS: ${AI_ROUTER_TIMEOUT_MS:-30000}
      VOICE_TRANSCRIPTION_TIMEOUT_MS: ${VOICE_TRANSCRIPTION_TIMEOUT_MS:-30000}
      USER_MANAGEMENT_TIMEOUT_MS: ${USER_MANAGEMENT_TIMEOUT_MS:-5000}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: telegram-bridge
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - public
      - internal

  ai-router:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx scripts/migrate.ts ai-router && ./node_modules/.bin/tsx services/ai-router/src/index.ts"
    expose:
      - "3002"
    environment:
      PORT: 3002
      SERVICE_NAME: ai-router
      JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS:-}
      DATABASE_URL: postgresql://monica:monica_dev@postgres:5432/monica_companion
      PENDING_COMMAND_TTL_MINUTES: ${PENDING_COMMAND_TTL_MINUTES:-30}
      EXPIRY_SWEEP_INTERVAL_MS: ${EXPIRY_SWEEP_INTERVAL_MS:-60000}
      MONICA_INTEGRATION_URL: http://monica-integration:3004
      DELIVERY_URL: http://delivery:3006
      SCHEDULER_URL: http://scheduler:3005
      USER_MANAGEMENT_URL: http://user-management:3007
      REDIS_URL: redis://redis:6379
      GUARDRAIL_RATE_LIMIT_PER_USER: ${GUARDRAIL_RATE_LIMIT_PER_USER:-30}
      GUARDRAIL_RATE_WINDOW_SECONDS: ${GUARDRAIL_RATE_WINDOW_SECONDS:-60}
      GUARDRAIL_CONCURRENCY_PER_USER: ${GUARDRAIL_CONCURRENCY_PER_USER:-3}
      GUARDRAIL_BUDGET_LIMIT_USD: ${GUARDRAIL_BUDGET_LIMIT_USD:-100}
      GUARDRAIL_BUDGET_ALARM_THRESHOLD_PCT: ${GUARDRAIL_BUDGET_ALARM_THRESHOLD_PCT:-80}
      GUARDRAIL_COST_PER_REQUEST_USD: ${GUARDRAIL_COST_PER_REQUEST_USD:-0.01}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: ai-router
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      monica-integration:
        condition: service_started
    networks:
      - internal

  voice-transcription:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx services/voice-transcription/src/index.ts"
    expose:
      - "3003"
    environment:
      PORT: 3003
      SERVICE_NAME: voice-transcription
      JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: redis://redis:6379
      WHISPER_MODEL: ${WHISPER_MODEL:-gpt-4o-transcribe}
      WHISPER_TIMEOUT_MS: ${WHISPER_TIMEOUT_MS:-60000}
      WHISPER_MAX_FILE_SIZE_BYTES: ${WHISPER_MAX_FILE_SIZE_BYTES:-26214400}
      FETCH_URL_TIMEOUT_MS: ${FETCH_URL_TIMEOUT_MS:-15000}
      WHISPER_COST_PER_MINUTE_USD: ${WHISPER_COST_PER_MINUTE_USD:-0.048}
      GUARDRAIL_RATE_LIMIT_PER_USER: ${GUARDRAIL_RATE_LIMIT_PER_USER:-30}
      GUARDRAIL_RATE_WINDOW_SECONDS: ${GUARDRAIL_RATE_WINDOW_SECONDS:-60}
      GUARDRAIL_CONCURRENCY_PER_USER: ${GUARDRAIL_CONCURRENCY_PER_USER:-3}
      GUARDRAIL_BUDGET_LIMIT_USD: ${GUARDRAIL_BUDGET_LIMIT_USD:-100}
      GUARDRAIL_BUDGET_ALARM_THRESHOLD_PCT: ${GUARDRAIL_BUDGET_ALARM_THRESHOLD_PCT:-80}
      GUARDRAIL_COST_PER_REQUEST_USD: ${GUARDRAIL_COST_PER_REQUEST_USD:-0.01}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: voice-transcription
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  monica-integration:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx services/monica-integration/src/index.ts"
    expose:
      - "3004"
    environment:
      PORT: 3004
      SERVICE_NAME: monica-integration
      JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS:-}
      USER_MANAGEMENT_URL: http://user-management:3007
      MONICA_DEFAULT_TIMEOUT_MS: ${MONICA_DEFAULT_TIMEOUT_MS:-10000}
      MONICA_RETRY_MAX: ${MONICA_RETRY_MAX:-2}
      ALLOW_PRIVATE_NETWORK_TARGETS: ${ALLOW_PRIVATE_NETWORK_TARGETS:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: monica-integration
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-management:
        condition: service_started
    networks:
      - internal

  scheduler:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx scripts/migrate.ts scheduler && ./node_modules/.bin/tsx services/scheduler/src/index.ts"
    expose:
      - "3005"
    environment:
      PORT: 3005
      SERVICE_NAME: scheduler
      JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS:-}
      DATABASE_URL: postgresql://monica:monica_dev@postgres:5432/monica_companion
      REDIS_URL: redis://redis:6379
      MONICA_INTEGRATION_URL: http://monica-integration:3004
      DELIVERY_URL: http://delivery:3006
      USER_MANAGEMENT_URL: http://user-management:3007
      AI_ROUTER_URL: http://ai-router:3002
      SCHEDULER_MAX_RETRIES: ${SCHEDULER_MAX_RETRIES:-3}
      SCHEDULER_RETRY_BACKOFF_MS: ${SCHEDULER_RETRY_BACKOFF_MS:-1000}
      CATCH_UP_WINDOW_HOURS: ${CATCH_UP_WINDOW_HOURS:-6}
      REMINDER_POLL_INTERVAL_MS: ${REMINDER_POLL_INTERVAL_MS:-60000}
      HTTP_TIMEOUT_MS: ${HTTP_TIMEOUT_MS:-10000}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: scheduler
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      monica-integration:
        condition: service_started
      user-management:
        condition: service_started
      ai-router:
        condition: service_started
    networks:
      - internal

  delivery:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx scripts/migrate.ts delivery && ./node_modules/.bin/tsx services/delivery/src/index.ts"
    expose:
      - "3006"
    environment:
      PORT: 3006
      SERVICE_NAME: delivery
      JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS:-}
      TELEGRAM_BRIDGE_URL: http://telegram-bridge:3001
      DATABASE_URL: postgresql://monica:monica_dev@postgres:5432/monica_companion
      HTTP_TIMEOUT_MS: ${HTTP_TIMEOUT_MS:-10000}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: delivery
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  user-management:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx scripts/migrate.ts user-management && ./node_modules/.bin/tsx services/user-management/src/index.ts"
    expose:
      - "3007"
    environment:
      PORT: 3007
      SERVICE_NAME: user-management
      JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS:-}
      DATABASE_URL: postgresql://monica:monica_dev@postgres:5432/monica_companion
      SETUP_TOKEN_SECRET: ${SETUP_TOKEN_SECRET}
      SETUP_BASE_URL: ${SETUP_BASE_URL:-http://localhost}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      ENCRYPTION_MASTER_KEY_PREVIOUS: ${ENCRYPTION_MASTER_KEY_PREVIOUS:-}
      AI_ROUTER_URL: http://ai-router:3002
      SCHEDULER_URL: http://scheduler:3005
      DELIVERY_URL: http://delivery:3006
      HTTP_TIMEOUT_MS: ${HTTP_TIMEOUT_MS:-10000}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: user-management
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  web-ui:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "cd services/web-ui && ../../node_modules/.pnpm/node_modules/.bin/astro dev --host 0.0.0.0 --port 4321"
    expose:
      - "4321"
    environment:
      PORT: 4321
      SERVICE_NAME: web-ui
      JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS:-}
      USER_MANAGEMENT_URL: http://user-management:3007
      EXPECTED_ORIGIN: ${EXPECTED_ORIGIN:-http://localhost}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: web-ui
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
    networks:
      - public
      - internal

  # -- Observability (--profile observability) ---------------------------------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    profiles: [observability]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./docker/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - internal

  grafana:
    image: grafana/grafana:12.4.1
    profiles: [observability]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - ./docker/grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - grafana_data:/var/lib/grafana
    networks:
      - internal

  loki:
    image: grafana/loki:3.6.7
    profiles: [observability]
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v3.10.0
    profiles: [observability]
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=14d"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal

  tempo:
    image: grafana/tempo:2.10.2
    profiles: [observability]
    ports:
      - "3200:3200"
    volumes:
      - ./docker/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/config.yaml
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  node_modules:
  grafana_data:
  loki_data:
  prometheus_data:
  tempo_data:

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
