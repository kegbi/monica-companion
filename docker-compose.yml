services:
  # ── Infrastructure (always start) ──────────────────────────────────────

  postgres:
    image: postgres:17.9-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: monica
      POSTGRES_PASSWORD: monica_dev
      POSTGRES_DB: monica_companion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monica"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:8.6.1-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  caddy:
    image: caddy:2.11.2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public

  # ── Dependency init (--profile app) ────────────────────────────────────

  deps-init:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: >
      sh -c "corepack enable && corepack prepare pnpm@10.12.1 --activate && pnpm install --frozen-lockfile"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    networks:
      - internal

  # ── Application services (--profile app) ───────────────────────────────

  telegram-bridge:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx services/telegram-bridge/src/index.ts"
    expose:
      - "3001"
    environment:
      PORT: 3001
      SERVICE_NAME: telegram-bridge
      JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-60}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - public
      - internal

  ai-router:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx services/ai-router/src/index.ts"
    expose:
      - "3002"
    environment:
      PORT: 3002
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  voice-transcription:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx services/voice-transcription/src/index.ts"
    expose:
      - "3003"
    environment:
      PORT: 3003
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  monica-integration:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx services/monica-integration/src/index.ts"
    expose:
      - "3004"
    environment:
      PORT: 3004
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  scheduler:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx services/scheduler/src/index.ts"
    expose:
      - "3005"
    environment:
      PORT: 3005
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  delivery:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx services/delivery/src/index.ts"
    expose:
      - "3006"
    environment:
      PORT: 3006
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  user-management:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "./node_modules/.bin/tsx services/user-management/src/index.ts"
    expose:
      - "3007"
    environment:
      PORT: 3007
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  web-ui:
    image: node:24.14.0-slim
    profiles: [app]
    working_dir: /app
    command: sh -c "cd services/web-ui && ../../node_modules/.pnpm/node_modules/.bin/astro dev --host 0.0.0.0 --port 4321"
    expose:
      - "4321"
    environment:
      PORT: 4321
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps-init:
        condition: service_completed_successfully
    networks:
      - public
      - internal

  # ── Observability (--profile observability) ────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    profiles: [observability]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./docker/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - internal

  grafana:
    image: grafana/grafana:12.4.1
    profiles: [observability]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./docker/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana_data:/var/lib/grafana
    networks:
      - internal

  loki:
    image: grafana/loki:3.6.7
    profiles: [observability]
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v3.10.0
    profiles: [observability]
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal

  tempo:
    image: grafana/tempo:2.10.2
    profiles: [observability]
    ports:
      - "3200:3200"
    volumes:
      - ./docker/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/config.yaml
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  node_modules:
  grafana_data:
  loki_data:
  prometheus_data:
  tempo_data:

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
